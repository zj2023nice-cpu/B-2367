services:
  server:
    build: ./server
    ports:
      - '3001:3001'
    volumes:
      - server-data:/app/data
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/api/specialties']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  server-data:
